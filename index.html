<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jusep Verso 2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Paletas con Estilo Material Design 3 Expressive (Tonos vibrantes y fondos profundos armónicos) */
        :root {
            --bg-color: #12181f;
            --text-color: #f1f2f4;
            --text-muted: #868e96;
            --active-bg: #2c353d;
            --active-icon: #3a9ad9;
            --main-bg: #0d1117;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Temas Material 3 Expressive aplicados mediante clases en el elemento body */
        body.theme-rojo {
            --bg-color: #201010;
            --main-bg: #140b0b;
            --text-color: #ffdad9;
            --text-muted: #dcbebd;
            --active-bg: #442222;
            --active-icon: #ffb4ab;
        }

        body.theme-naranja {
            --bg-color: #1f1206;
            --main-bg: #140b02;
            --text-color: #ffddb6;
            --text-muted: #dec2a2;
            --active-bg: #43290f;
            --active-icon: #ffb776;
        }

        body.theme-amarillo {
            --bg-color: #1c1400;
            --main-bg: #110d00;
            --text-color: #f2e2bb;
            --text-muted: #d5c6a1;
            --active-bg: #3c2f00;
            --active-icon: #e5c36c;
        }

        body.theme-verde {
            --bg-color: #0b150f;
            --main-bg: #050e0a;
            --text-color: #e1e3df;
            --text-muted: #c5c7c3;
            --active-bg: #1f3729;
            --active-icon: #6cdb9d;
        }

        body.theme-azul {
            --bg-color: #0c1520;
            --main-bg: #050e18;
            --text-color: #e2e2e9;
            --text-muted: #c6c6cd;
            --active-bg: #1d3147;
            --active-icon: #9ecafe;
        }

        body.theme-morado {
            --bg-color: #17101f;
            --main-bg: #100a16;
            --text-color: #f5daff;
            --text-muted: #d9bedf;
            --active-bg: #352249;
            --active-icon: #e8b3ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: var(--font-family);
            -webkit-font-smoothing: antialiased;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .sidebar {
            width: 320px;
            height: 100vh;
            background-color: var(--bg-color);
            box-sizing: border-box;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
            flex-shrink: 0;
            transition: background-color 0.3s ease;
        }

        /* CONTENEDOR PRINCIPAL DERECHO */
        .main-content {
            flex-grow: 1;
            height: 100vh;
            background-color: var(--main-bg);
            color: var(--text-color);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .main-content h1 {
            margin: 0 0 16px 0;
            font-size: 36px;
            font-weight: 600;
            padding: 0 20px;
        }

        .main-content p {
            color: var(--text-muted);
            font-size: 18px;
            margin: 0;
            max-width: 500px;
            line-height: 1.5;
            padding: 0 20px;
        }

        /* IMAGENES ABSOLUTAS: Ocupan todo el espacio disponible de borde a borde */
        .jusep-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            display: none;
        }

        .window-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-left: 8px;
            padding-right: 4px;
        }

        /* CONTENEDORES RELATIVOS PARA MENÚS DESPLEGABLES */
        .more-container, .profile-container {
            position: relative;
        }

        .btn-profile {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .btn-profile:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: var(--text-muted);
        }

        .btn-profile.connected {
            border-color: #2ea44f;
        }

        .btn-profile svg {
            width: 16px;
            height: 16px;
            fill: var(--text-color);
        }

        .btn-profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* DROPDOWNS: DISEÑO COMÚN */
        .profile-dropdown, .more-dropdown {
            position: absolute;
            top: 38px;
            background-color: rgba(25, 30, 40, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            padding: 14px;
            display: none;
            z-index: 100;
            flex-direction: column;
            gap: 10px;
        }

        .profile-dropdown {
            right: 0;
            width: 210px;
        }

        .more-dropdown {
            left: 0;
            width: 260px;
        }

        .profile-dropdown.show, .more-dropdown.show {
            display: flex;
        }

        .dropdown-info {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            padding: 2px 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dropdown-divider {
            height: 1px;
            background-color: rgba(255, 255, 255, 0.08);
            margin: 4px 0;
        }

        /* SECCIÓN DEL INTERIOR DE CANJEAR CÓDIGO */
        .redeem-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .redeem-section label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .redeem-input-group {
            display: flex;
            gap: 6px;
        }

        .redeem-input {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            color: var(--text-color);
            padding: 6px 10px;
            font-size: 13px;
            flex-grow: 1;
            outline: none;
        }

        .redeem-input:focus {
            border-color: var(--active-icon);
        }

        .btn-redeem-action {
            background-color: #2ea44f;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-redeem-action:hover {
            background-color: #2c974b;
        }

        /* SECCIÓN DEL INTERIOR DE TEMAS */
        .themes-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .themes-section span {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .theme-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .btn-theme-select {
            background-color: rgba(255, 255, 255, 0.04);
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 6px;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-theme-select:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: var(--text-muted);
        }

        .btn-theme-select.active-theme {
            border-color: var(--active-icon);
            background-color: var(--active-bg);
            font-weight: 600;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.05);
        }

        /* Colores sutiles indicadores para los botones de temas */
        .btn-theme-select[data-theme="rojo"] { border-left: 4px solid #ffb4ab; }
        .btn-theme-select[data-theme="naranja"] { border-left: 4px solid #ffb776; }
        .btn-theme-select[data-theme="amarillo"] { border-left: 4px solid #e5c36c; }
        .btn-theme-select[data-theme="verde"] { border-left: 4px solid #6cdb9d; }
        .btn-theme-select[data-theme="azul"] { border-left: 4px solid #9ecafe; }
        .btn-theme-select[data-theme="morado"] { border-left: 4px solid #e8b3ff; }

        .btn-github-action {
            background-color: #24292e;
            color: #ffffff;
            border: 1px solid #444c56;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            width: 100%;
        }

        .btn-github-action:hover {
            background-color: #2f363d;
        }

        .btn-logout-action {
            background-color: transparent;
            color: #ff453a;
            border: none;
            padding: 6px 4px;
            font-size: 13px;
            cursor: pointer;
            text-align: left;
            display: none;
            font-weight: 500;
        }

        .btn-logout-action:hover {
            text-decoration: underline;
        }

        .btn-more {
            background-color: var(--active-bg);
            border: none;
            border-radius: 8px;
            width: 54px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-more svg {
            fill: var(--text-color);
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 10px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            gap: 16px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background-color: var(--active-bg);
            color: var(--text-color);
            font-weight: 500;
        }

        .nav-icon-square {
            width: 24px;
            height: 24px;
            object-fit: cover;
            flex-shrink: 0;
            border-radius: 0; 
            border: none;       
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .nav-item .icon-blue {
            color: var(--active-icon);
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            padding: 16px 12px 6px 12px;
            margin-top: 10px;
        }

        .section-header svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Jusep Nuget oculto por defecto en CSS */
        #nav-nuget {
            display: none;
        }
    </style>
</head>

            "jusep-estrella": { title: "", desc: "" },
            "jusep-mango": { title: "", desc: "" },
            "jusep-nuget": { title: "", desc: "" }, 
            "jusep-clicker": {
                title: "Jusep Clicker 🍪👀",
                desc: "Muy Pronto, ¿Codigo BAQUE? ... > Canjear codigo"
            },
            "jusep-rpg": {
                title: "Jusep RPG 🦴🔵👀",
                desc: "EN DESAROLLO, POSIBLE LANZAMIENTO 2027"
            },
            "primer-lanzamiento": {
                title: "Cambios de la version 2026.06.16",
                desc: "Se añadio un nuevo Jusep (JUSEP MANGO), se agrego un sistema de cuentas, tambien se agregaron dos espacios para futuros juegos, temas y codigos BAQUE"
            }
        };

        // --- CONTROL EXTRICTO DE VISIBILIDAD DE JUSEP NUGET ---
        function verificarVisibilidadNuget() {
            // Condición futura global libre
            if (NUGET_PUBLICO) {
                navNuget.style.display = "flex";
                return;
            }

            // Condición actual: Debe estar logueado Y haber canjeado el código en este navegador
            const haSidoDesbloqueado = localStorage.getItem('jusep_nuget_desbloqueado') === 'true';
            if (currentUser && haSidoDesbloqueado) {
                navNuget.style.display = "flex";
            } else {
                // Si cambia de pestaña a Nuget y se desloguea, lo devuelve a inicio
                if (navNuget.classList.contains('active')) {
                    document.querySelector('[data-section="inicio"]').click();
                }
                navNuget.style.display = "none";
            }
        }

        // --- MANEJO DE REPRODUCCIONES DE AUDIO ---
        jusepImgElement.addEventListener('click', () => {
            clickSound.currentTime = 0;
            clickSound.play().catch(err => console.log(err));
        });

        jusepEsponjaImg.addEventListener('click', () => {
            clickEsponjaSound.currentTime = 0;
            clickEsponjaSound.play().catch(err => console.log(err));
        });

        jusepEstrellaImg.addEventListener('click', () => {
            clickEstrellaSound.currentTime = 0;
            clickEstrellaSound.play().catch(err => console.log(err));
        });

        jusepMangoImg.addEventListener('click', () => {
            clickMangoSound.currentTime = 0;
            clickMangoSound.play().catch(err => console.log(err));
        });

        jusepNugetImg.addEventListener('click', () => {
            clickNugetSound.currentTime = 0;
            clickNugetSound.play().catch(err => console.log(err));
        });

        function hideAllImages() {
            jusepImgElement.style.display = "none";
            jusepEsponjaImg.style.display = "none";
            jusepEstrellaImg.style.display = "none";
            jusepMangoImg.style.display = "none";
            jusepNugetImg.style.display = "none";
        }

        function pauseAllBackgroundMusic() {
            bgMusic.pause();
            bgEsponjaMusic.pause();
            bgEstrellaMusic.pause();
            bgMangoMusic.pause();
            bgNugetMusic.pause();
        }

        // Intercambio de navegación de pestañas
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');

                const targetKey = item.getAttribute('data-section');
                
                if (sectionsData[targetKey]) {
                    contentTitle.innerText = sectionsData[targetKey].title;
                    contentDesc.innerText = sectionsData[targetKey].desc;
                }

                contentTitle.style.display = "none"; 
                contentDesc.style.display = "none";  
                hideAllImages();
                pauseAllBackgroundMusic();

                if (targetKey === "inicio") {
                    contentTitle.style.display = "block"; 
                    contentDesc.style.display = "block";
                }
                else if (targetKey === "jusep") {
                    jusepImgElement.style.display = "block"; 
                    bgMusic.play().catch(err => console.log(err));
                } 
                else if (targetKey === "jusep-esponja") {
                    jusepEsponjaImg.style.display = "block";
                    bgEsponjaMusic.play().catch(err => console.log(err));
                } 
                else if (targetKey === "jusep-estrella") {
                    jusepEstrellaImg.style.display = "block";
                    bgEstrellaMusic.play().catch(err => console.log(err));
                } 
                else if (targetKey === "jusep-mango") {
                    jusepMangoImg.style.display = "block";
                    bgMangoMusic.play().catch(err => console.log(err));
                } 
                else if (targetKey === "jusep-nuget") {
                    jusepNugetImg.style.display = "block";
                    bgNugetMusic.play().catch(err => console.log(err));
                }
                else {
                    contentTitle.style.display = "block"; 
                    contentDesc.style.display = "block";
                }
            });
        });

        const activeItem = document.querySelector('.nav-item.active');
        if(activeItem && activeItem.getAttribute('data-section') === 'inicio') {
            contentTitle.style.display = "block";
            contentDesc.style.display = "block";
            hideAllImages();
        }

        // --- MANEJO DE MENÚS DESPLEGABLES ---
        profileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            moreDropdown.classList.remove('show');
            profileDropdown.classList.toggle('show');
        });

        moreBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            profileDropdown.classList.remove('show');
            moreDropdown.classList.toggle('show');
        });

        document.addEventListener('click', () => {
            profileDropdown.classList.remove('show');
            moreDropdown.classList.remove('show');
        });

        profileDropdown.addEventListener('click', (e) => e.stopPropagation());
        moreDropdown.addEventListener('click', (e) => e.stopPropagation());


        // --- CONEXIÓN DE SUPABASE ---
        let _supabase = null;
        try {
            if (SUPABASE_URL && SUPABASE_ANON_KEY) {
                _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch (err) {
            console.error(err);
        }

        loginBtn.addEventListener('click', async () => {
            if (!_supabase) {
                alert("Primero debes configurar tus claves válidas de Supabase.");
                return;
            }
            dropdownStatus.innerText = "Abriendo GitHub...";
            const { error } = await _supabase.auth.signInWithOAuth({
                provider: 'github',
                options: { redirectTo: window.location.href }
            });
            if (error) {
                alert("Error de conexión: " + error.message);
                dropdownStatus.innerText = "Cuenta no conectada";
            }
        });

        logoutBtn.addEventListener('click', async () => {
            if (_supabase) await _supabase.auth.signOut();
            updateUI(null);
        });

        // Lógica de canjeo de códigos vinculados
        redeemBtn.addEventListener('click', async () => {
            const code = giftCodeInput.value.trim();
            if (!code) {
                alert("Por favor, escribe un código.");
                return;
            }

            // Canjeo del código condicional de Nuget
            if (code === "NugetBAQUE?") {
                if (!currentUser) {
                    alert("¡Error! Debes conectar tu cuenta primero para poder canjear códigos especiales.");
                    return;
                }
                localStorage.setItem('jusep_nuget_desbloqueado', 'true');
                verificarVisibilidadNuget();
                alert("¡Felicidades! Has desbloqueado permanentemente a Jusep Nuget 👀🍗");
                giftCodeInput.value = "";
                return;
            }

            if (!currentUser) {
                alert("¡Debes conectar tu cuenta de GitHub primero para guardar la tarjeta de regalo de manera persistente!");
                return;
            }
            alert(`Enviando tarjeta regalo: "${code}" para la cuenta vinculada con ID: ${currentUser.id}. (Listo para guardar en la tabla Supabase)`);
            giftCodeInput.value = "";
        });

        // --- LÓGICA DE TEMAS ---
        themeButtons.forEach(btn => {
            btn.addEventListener('click', async () => {
                const selectedTheme = btn.getAttribute('data-theme');
                
                themeButtons.forEach(b => b.classList.remove('active-theme'));
                btn.classList.add('active-theme');

                document.body.className = '';
                if (selectedTheme !== 'defecto') {
                    document.body.classList.add(`theme-${selectedTheme}`);
                }

                if (!currentUser) {
                    localStorage.setItem('jusep_local_theme', selectedTheme);
                    return;
                }
            });
        });


        function updateUI(user) {
            currentUser = user;

            // Cada vez que cambia el estado del usuario, recalculamos si debe ver a Jusep Nuget
            verificarVisibilidadNuget();

            if (user) {
                const avatarUrl = user.user_metadata.avatar_url;
                const name = user.user_metadata.full_name || user.user_metadata.user_name;

                avatarImage.src = avatarUrl;
                avatarImage.style.display = 'block';
                avatarDefault.style.display = 'none';
                profileBtn.classList.add('connected');
                dropdownStatus.innerText = `Conectado: ${name}`;
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
            } else {
                avatarImage.src = '';
                avatarImage.style.display = 'none';
                avatarDefault.style.display = 'block';
                profileBtn.classList.remove('connected');
                dropdownStatus.innerText = "Cuenta no conectada";
                loginBtn.style.display = 'flex';
                logoutBtn.style.display = 'none';

                const localTheme = localStorage.getItem('jusep_local_theme') || 'defecto';
                document.body.className = '';
                themeButtons.forEach(b => b.classList.remove('active-theme'));
                if (localTheme !== 'defecto') {
                    document.body.classList.add(`theme-${localTheme}`);
                }
                const activeBtn = document.querySelector(`.btn-theme-select[data-theme="${localTheme}"]`);
                if (activeBtn) activeBtn.classList.add('active-theme');
            }
        }

        if (_supabase) {
            _supabase.auth.onAuthStateChange((event, session) => {
                if (session) updateUI(session.user);
                else updateUI(null);
            });
        } else {
            const localTheme = localStorage.getItem('jusep_local_theme') || 'defecto';
            if (localTheme !== 'defecto') document.body.classList.add(`theme-${localTheme}`);
            const activeBtn = document.querySelector(`.btn-theme-select[data-theme="${localTheme}"]`);
            if (activeBtn) activeBtn.classList.add('active-theme');
            verificarVisibilidadNuget();
        }
    </script>
</body>
</html>
