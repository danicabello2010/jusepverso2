<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jusep Verso 2 - Mobile Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Paletas con Estilo Material Design 3 Expressive */
        :root {
            --bg-color: #12181f;
            --text-color: #f1f2f4;
            --text-muted: #868e96;
            --active-bg: #2c353d;
            --active-icon: #3a9ad9;
            --main-bg: #0d1117;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body.theme-rojo {
            --bg-color: #201010; --main-bg: #140b0b; --text-color: #ffdad9;
            --text-muted: #dcbebd; --active-bg: #442222; --active-icon: #ffb4ab;
        }
        body.theme-naranja {
            --bg-color: #1f1206; --main-bg: #140b02; --text-color: #ffddb6;
            --text-muted: #dec2a2; --active-bg: #43290f; --active-icon: #ffb776;
        }
        body.theme-amarillo {
            --bg-color: #1c1400; --main-bg: #110d00; --text-color: #f2e2bb;
            --text-muted: #d5c6a1; --active-bg: #3c2f00; --active-icon: #e5c36c;
        }
        body.theme-verde {
            --bg-color: #0b150f; --main-bg: #050e0a; --text-color: #e1e3df;
            --text-muted: #c5c7c3; --active-bg: #1f3729; --active-icon: #6cdb9d;
        }
        body.theme-azul {
            --bg-color: #0c1520; --main-bg: #050e18; --text-color: #e2e2e9;
            --text-muted: #c6c6cd; --active-bg: #1d3147; --active-icon: #9ecafe;
        }
        body.theme-morado {
            --bg-color: #17101f; --main-bg: #100a16; --text-color: #f5daff;
            --text-muted: #d9bedf; --active-bg: #352249; --active-icon: #e8b3ff;
        }

        body {
            margin: 0; padding: 0;
            background-color: #000;
            font-family: var(--font-family);
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        /* BARRA LATERAL (ESCRITORIO) */
        .sidebar {
            width: 320px;
            height: 100vh;
            background-color: var(--bg-color);
            box-sizing: border-box;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
            flex-shrink: 0;
            transition: background-color 0.3s ease;
            overflow-y: auto;
        }

        /* CONTENEDOR PRINCIPAL DERECHO */
        .main-content {
            flex-grow: 1;
            height: 100vh;
            background-color: var(--main-bg);
            color: var(--text-color);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .main-content h1 { margin: 0 0 16px 0; font-size: 32px; font-weight: 600; padding: 0 20px; z-index: 2; }
        .main-content p { color: var(--text-muted); font-size: 16px; margin: 0; max-width: 500px; line-height: 1.5; padding: 0 20px; z-index: 2; }

        /* IMÁGENES ABSOLUTAS */
        .jusep-image {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; cursor: pointer;
            display: none; z-index: 1;
        }

        .window-controls {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px; padding-left: 8px; padding-right: 4px;
        }

        .more-container, .profile-container { position: relative; }

        .btn-profile {
            width: 36px; height: 36px; border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; padding: 0; overflow: hidden;
        }
        .btn-profile.connected { border-color: #2ea44f; }
        .btn-profile svg { width: 18px; height: 18px; fill: var(--text-color); }
        .btn-profile img { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* DROPDOWNS COMUNES */
        .profile-dropdown, .more-dropdown {
            position: absolute; top: 42px;
            background-color: rgba(20, 25, 35, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            padding: 14px; display: none; z-index: 100;
            flex-direction: column; gap: 10px;
        }
        .profile-dropdown { right: 0; width: 210px; }
        .more-dropdown { left: 0; width: 260px; }
        .profile-dropdown.show, .more-dropdown.show { display: flex; }

        .dropdown-info { font-size: 13px; color: var(--text-muted); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .dropdown-divider { height: 1px; background-color: rgba(255, 255, 255, 0.08); margin: 4px 0; }

        /* SECCIONES INTERNAS MENU */
        .redeem-section { display: flex; flex-direction: column; gap: 6px; }
        .redeem-section label, .themes-section span { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
        .redeem-input-group { display: flex; gap: 6px; }
        .redeem-input { background-color: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 6px; color: var(--text-color); padding: 8px; font-size: 13px; flex-grow: 1; outline: none; }
        .btn-redeem-action { background-color: #2ea44f; color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }

        .themes-section { display: flex; flex-direction: column; gap: 8px; }
        .theme-options { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .btn-theme-select { background-color: rgba(255, 255, 255, 0.04); color: var(--text-color); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 8px 4px; font-size: 12px; cursor: pointer; font-weight: 500; }
        .btn-theme-select.active-theme { border-color: var(--active-icon); background-color: var(--active-bg); font-weight: 600; }

        .btn-theme-select[data-theme="rojo"] { border-left: 4px solid #ffb4ab; }
        .btn-theme-select[data-theme="naranja"] { border-left: 4px solid #ffb776; }
        .btn-theme-select[data-theme="amarillo"] { border-left: 4px solid #e5c36c; }
        .btn-theme-select[data-theme="verde"] { border-left: 4px solid #6cdb9d; }
        .btn-theme-select[data-theme="azul"] { border-left: 4px solid #9ecafe; }
        .btn-theme-select[data-theme="morado"] { border-left: 4px solid #e8b3ff; }

        .btn-github-action { background-color: #24292e; color: #ffffff; border: 1px solid #444c56; border-radius: 6px; padding: 8px; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; width: 100%; }
        .btn-logout-action { background-color: transparent; color: #ff453a; border: none; padding: 6px 4px; font-size: 13px; cursor: pointer; display: none; font-weight: 500; }

        .btn-more { background-color: var(--active-bg); border: none; border-radius: 8px; width: 54px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-more svg { fill: var(--text-color); }

        /* ITEMS DE NAVEGACIÓN */
        .nav-item {
            display: flex; align-items: center; padding: 10px 12px; border-radius: 10px;
            color: var(--text-color); text-decoration: none; font-size: 15px; gap: 16px; cursor: pointer;
        }
        .nav-item:hover { background-color: rgba(255, 255, 255, 0.05); }
        .nav-item.active { background-color: var(--active-bg); font-weight: 500; }

        .nav-icon-square { width: 24px; height: 24px; object-fit: cover; flex-shrink: 0; border-radius: 4px; }
        .nav-item svg { width: 24px; height: 24px; flex-shrink: 0; }
        .nav-item .icon-blue { color: var(--active-icon); fill: none; stroke: currentColor; stroke-width: 2; }

        .section-header { display: flex; justify-content: space-between; align-items: center; color: var(--text-muted); font-size: 12px; font-weight: 700; text-transform: uppercase; padding: 14px 12px 4px 12px; }
        .section-header svg { width: 14px; height: 14px; fill: currentColor; }

        #nav-nuget { display: none; }

        /* =========================================================================
           MÓVIL / PANTALLAS VERTICALES (MEDIA QUERY)
           ========================================================================= */
        @media (max-width: 768px) {
            body {
                flex-direction: column-reverse; /* El contenido arriba, el menú abajo */
            }

            /* Cambiar la barra lateral en una barra inferior horizontal haptica */
            .sidebar {
                width: 100%;
                height: 75px;
                min-height: 75px;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                padding: 0 10px;
                gap: 0;
                overflow-y: hidden;
                overflow-x: auto;
                border-top: 1px solid rgba(255, 255, 255, 0.08);
                z-index: 99;
            }

            /* Ocultar las cabeceras de sección y textos en los botones en el menú móvil */
            .sidebar .section-header, 
            .sidebar .nav-item span {
                display: none !important;
            }

            .window-controls {
                margin-bottom: 0;
                padding: 0;
                gap: 8px;
            }

            /* Adaptar botones para que queden cómodos al dedo */
            .nav-item {
                padding: 12px;
                border-radius: 12px;
                justify-content: center;
                flex-grow: 1;
            }

            .main-content {
                width: 100%;
                height: calc(100vh - 75px);
            }

            .main-content h1 { font-size: 26px; }
            .main-content p { font-size: 14px; }

            /* Reposicionar los Desplegables en formato "Modales Flotantes Inferiores" */
            .more-dropdown, .profile-dropdown {
                position: fixed;
                bottom: 85px; /* Flotan justo arriba de la barra de navegación */
                top: auto !important;
                left: 16px !important;
                right: 16px !important;
                width: calc(100% - 32px) !important;
                box-sizing: border-box;
                background-color: rgba(15, 20, 30, 0.98);
                box-shadow: 0 -4px 25px rgba(0,0,0,0.8);
            }
        }
    </style>
</head>

    <script>
        const NUGET_PUBLICO = false; 

        // Configuración Supabase
        const SUPABASE_URL = "https://fimkpoqhzwruxhpsavhc.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_TTXdlD8qqhYbBtLdSaWxqA_Ca_Uip7u"; 

        // Elementos DOM
        const profileBtn = document.getElementById('profileBtn');
        const profileDropdown = document.getElementById('profileDropdown');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const avatarDefault = document.getElementById('avatarDefault');

        const redeemBtn = document.getElementById('redeemBtn');
        const themeButtons = document.querySelectorAll('.btn-theme-select');

        const contentTitle = document.getElementById('contentTitle');
        const contentDesc = document.getElementById('contentDesc');
        
        const jusepImgElement = document.getElementById('jusepImgElement');
        const jusepEsponjaImg = document.getElementById('jusepEsponjaImg');
        const jusepEstrellaImg = document.getElementById('jusepEstrellaImg');
        const jusepMangoImg = document.getElementById('jusepMangoImg');
        const jusepNugetImg = document.getElementById('jusepNugetImg'); 

        const bgMusic = document.getElementById('bgMusic');
        const bgEsponjaMusic = document.getElementById('bgEsponjaMusic');
        const bgEstrellaMusic = document.getElementById('bgEstrellaMusic');
        const bgMangoMusic = document.getElementById('bgMangoMusic');
        const bgNugetMusic = document.getElementById('bgNugetMusic'); 

        const clickSound = document.getElementById('clickSound');
        const clickEsponjaSound = document.getElementById('clickEsponjaSound');

        const clickMangoSound = document.getElementById('clickMangoSound');

        const navItems = document.querySelectorAll('.nav-item');

        let currentUser = null;

        const sectionsData = {

            "jusep": { title: "", desc: "" },
            "jusep-esponja": { title: "", desc: "" },
            "jusep-estrella": { title: "", desc: "" },
            "jusep-mango": { title: "", desc: "" },
            "jusep-nuget": { title: "", desc: "" }, 
            "jusep-clicker": { title: "Jusep Clicker 🍪👀", desc: "Muy Pronto, ¿Codigo BAQUE? ... > Canjear codigo" },
            "jusep-rpg": { title: "Jusep RPG 🦴🔵👀", desc: "EN DESAROLLO, POSIBLE LANZAMIENTO 2027" },
            "primer-lanzamiento": { title: "Cambios de la version 2026.06.16", desc: "Se añadio un nuevo Jusep (JUSEP MANGO), sistema de cuentas en la nube, soporte móvil responsivo, temas y códigos BAQUE." }
        };

        function verificarVisibilidadNuget() {
            if (NUGET_PUBLICO) { navNuget.style.display = "flex"; return; }
            const haSidoDesbloqueado = localStorage.getItem('jusep_nuget_desbloqueado') === 'true';
            if (currentUser && haSidoDesbloqueado) {
                navNuget.style.display = "flex";
            } else {
                if (navNuget.classList.contains('active')) {
                    document.querySelector('[data-section="inicio"]').click();
                }
                navNuget.style.display = "none";
            }
        }

        // Eventos Clicks interactivos
        jusepImgElement.addEventListener('click', () => { clickSound.currentTime = 0; clickSound.play().catch(e=>0); });
        jusepEsponjaImg.addEventListener('click', () => { clickEsponjaSound.currentTime = 0; clickEsponjaSound.play().catch(e=>0); });
        jusepEstrellaImg.addEventListener('click', () => { clickEstrellaSound.currentTime = 0; clickEstrellaSound.play().catch(e=>0); });
        jusepMangoImg.addEventListener('click', () => { clickMangoSound.currentTime = 0; clickMangoSound.play().catch(e=>0); });
        jusepNugetImg.addEventListener('click', () => { clickNugetSound.currentTime = 0; clickNugetSound.play().catch(e=>0); });

        function hideAllImages() {
            jusepImgElement.style.display = "none"; jusepEsponjaImg.style.display = "none";
            jusepEstrellaImg.style.display = "none"; jusepMangoImg.style.display = "none";
            jusepNugetImg.style.display = "none";
        }

        function pauseAllBackgroundMusic() {
            bgMusic.pause(); bgEsponjaMusic.pause(); bgEstrellaMusic.pause(); bgMangoMusic.pause(); bgNugetMusic.pause();
        }

        // Navegación fluida
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                const targetKey = item.getAttribute('data-section');
                
                if (sectionsData[targetKey]) {
                    contentTitle.innerText = sectionsData[targetKey].title;
                    contentDesc.innerText = sectionsData[targetKey].desc;
                }

                contentTitle.style.display = "none"; contentDesc.style.display = "none";  
                hideAllImages(); pauseAllBackgroundMusic();

                if (targetKey === "inicio") { contentTitle.style.display = "block"; contentDesc.style.display = "block"; }
                else if (targetKey === "jusep") { jusepImgElement.style.display = "block"; bgMusic.play().catch(e=>0); } 
                else if (targetKey === "jusep-esponja") { jusepEsponjaImg.style.display = "block"; bgEsponjaMusic.play().catch(e=>0); } 
                else if (targetKey === "jusep-estrella") { jusepEstrellaImg.style.display = "block"; bgEstrellaMusic.play().catch(e=>0); } 
                else if (targetKey === "jusep-mango") { jusepMangoImg.style.display = "block"; bgMangoMusic.play().catch(e=>0); } 
                else if (targetKey === "jusep-nuget") { jusepNugetImg.style.display = "block"; bgNugetMusic.play().catch(e=>0); }
                else { contentTitle.style.display = "block"; contentDesc.style.display = "block"; }
            });
        });

        // Eventos de Menús Desplegables Inteligentes
        profileBtn.addEventListener('click', (e) => { e.stopPropagation(); moreDropdown.classList.remove('show'); profileDropdown.classList.toggle('show'); });
        moreBtn.addEventListener('click', (e) => { e.stopPropagation(); profileDropdown.classList.remove('show'); moreDropdown.classList.toggle('show'); });
        document.addEventListener('click', () => { profileDropdown.classList.remove('show'); moreDropdown.classList.remove('show'); });
        profileDropdown.addEventListener('click', (e) => e.stopPropagation());
        moreDropdown.addEventListener('click', (e) => e.stopPropagation());

        // Inicializar Supabase
        let _supabase = null;
        try { if (SUPABASE_URL && SUPABASE_ANON_KEY) _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch (err) { console.error(err); }

        loginBtn.addEventListener('click', async () => {
            if (!_supabase) { alert("Configura tus claves de Supabase."); return; }
            dropdownStatus.innerText = "Abriendo GitHub...";
            await _supabase.auth.signInWithOAuth({ provider: 'github', options: { redirectTo: window.location.href } });
        });

        logoutBtn.addEventListener('click', async () => { if (_supabase) await _supabase.auth.signOut(); updateUI(null); });

        // Canjeo de Códigos
        redeemBtn.addEventListener('click', async () => {
            const code = giftCodeInput.value.trim();
            if (!code) { alert("Escribe un código."); return; }

            if (code === "NugetBAQUE?") {
                if (!currentUser) { alert("¡Error! Debes conectar tu cuenta primero."); return; }
                localStorage.setItem('jusep_nuget_desbloqueado', 'true');
                verificarVisibilidadNuget();
                alert("¡Felicidades! Has desbloqueado permanentemente a Jusep Nuget 👀🍗");
                giftCodeInput.value = "";
                return;
            }
            if (!currentUser) { alert("¡Conecta tu cuenta primero!"); return; }
            alert(`Código enviado a revisión: "${code}"`);
            giftCodeInput.value = "";
        });

        // Cambiar Temas
        function setTemaVisual(themeName) {
            document.body.className = '';
            themeButtons.forEach(b => b.classList.remove('active-theme'));
            if (themeName !== 'defecto') document.body.classList.add(`theme-${themeName}`);
            const activeBtn = document.querySelector(`.btn-theme-select[data-theme="${themeName}"]`);
            if (activeBtn) activeBtn.classList.add('active-theme');
        }

        themeButtons.forEach(btn => {
            btn.addEventListener('click', async () => {
                const selectedTheme = btn.getAttribute('data-theme');
                setTemaVisual(selectedTheme);

                if (!currentUser) {
                    localStorage.setItem('jusep_local_theme', selectedTheme);
                    return;
                }
                if (!_supabase) return;
                await _supabase.from('user_preferences').upsert({ user_id: currentUser.id, theme: selectedTheme }, { onConflict: 'user_id' });
            });
        });

        async function cargarTemaGuardado(userId) {
            if (!_supabase) return;
            const { data, error } = await _supabase.from('user_preferences').select('theme').eq('user_id', userId).single();
            if (data && data.theme) setTemaVisual(data.theme);
            else setTemaVisual(localStorage.getItem('jusep_local_theme') || 'defecto');
        }

        // Actualizar Interfaz según Usuario (Conectado / Desconectado)
        function updateUI(user) {
            currentUser = user;
            verificarVisibilidadNuget();

            if (user) {
                const avatarUrl = user.user_metadata.avatar_url;
                const name = user.user_metadata.full_name || user.user_metadata.user_name;

                avatarImage.src = avatarUrl; avatarImage.style.display = 'block'; avatarDefault.style.display = 'none';
                profileBtn.classList.add('connected');
                dropdownStatus.innerText = `${name}`;
                loginBtn.style.display = 'none'; logoutBtn.style.display = 'block';
                cargarTemaGuardado(user.id);
            } else {
                avatarImage.src = ''; avatarImage.style.display = 'none'; avatarDefault.style.display = 'block';
                profileBtn.classList.remove('connected');
                dropdownStatus.innerText = "Cuenta no conectada";
                loginBtn.style.display = 'flex'; logoutBtn.style.display = 'none';
                setTemaVisual(localStorage.getItem('jusep_local_theme') || 'defecto');
            }
        }

        if (_supabase) {
            _supabase.auth.onAuthStateChange((event, session) => {
                if (session) updateUI(session.user);
                else updateUI(null);
            });
        } else {
            setTemaVisual(localStorage.getItem('jusep_local_theme') || 'defecto');
            verificarVisibilidadNuget();
        }
    </script>
</body>
</html>
