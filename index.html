<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jusep Verso 2</title>
    <style>
        :root {
            --bg-color: #12181f;
            --text-color: #f1f2f4;
            --text-muted: #868e96;
            --active-bg: #2c353d;
            --active-icon: #3a9ad9;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: var(--font-family);
            -webkit-font-smoothing: antialiased;
        }

        .sidebar {
            width: 320px;
            height: 100vh;
            background-color: var(--bg-color);
            box-sizing: border-box;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
        }

        /* Top window control bar simulation - MODIFICADO PARA COLOCAR LOS BOTONES EN EXTREMOS OPUESTOS */
        .window-controls {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Empuja los 3 puntos a la izquierda y el perfil a la derecha */
            margin-bottom: 24px;
            padding-left: 8px;
            padding-right: 4px;
        }

        /* Contenedor del Perfil de GitHub (Movido a la derecha) */
        .profile-container {
            position: relative;
        }

        .btn-profile {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #1a222b;
            border: 1px solid #3a444f;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .btn-profile:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: var(--text-muted);
        }

        .btn-profile.connected {
            border-color: #2ea44f;
        }

        .btn-profile svg {
            width: 16px;
            height: 16px;
            fill: var(--text-color);
        }

        .btn-profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* Menú desplegable flotante - AJUSTADO A LA DERECHA PARA QUE NO SE SALGA DE LA PANTALLA */
        .profile-dropdown {
            position: absolute;
            top: 38px;
            right: 0; /* Abre hacia la izquierda desde la esquina del botón */
            background-color: #1a232d;
            border: 1px solid #2d3846;
            border-radius: 10px;
            width: 210px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            padding: 10px;
            display: none;
            z-index: 100;
            flex-direction: column;
            gap: 8px;
        }

        .profile-dropdown.show {
            display: flex;
        }

        .dropdown-info {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            padding: 2px 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-github-action {
            background-color: #24292e;
            color: #ffffff;
            border: 1px solid #444c56;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            width: 100%;
        }

        .btn-github-action:hover {
            background-color: #2f363d;
        }

        .btn-logout-action {
            background-color: transparent;
            color: #ff453a;
            border: none;
            padding: 6px 4px;
            font-size: 13px;
            cursor: pointer;
            text-align: left;
            display: none;
            font-weight: 500;
        }

        .btn-logout-action:hover {
            text-decoration: underline;
        }

        .btn-more {
            background-color: #2c353d;
            border: none;
            border-radius: 8px;
            width: 54px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-more svg {
            fill: var(--text-color);
        }

        /* Navigation Items */
        .nav-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 10px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            gap: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background-color: var(--active-bg);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        .nav-item .icon-blue {
            color: var(--active-icon);
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        /* Headers / Category Sections */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            padding: 16px 12px 6px 12px;
            margin-top: 10px;
        }

        .section-header svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Divider for Labels */
        .divider {
            height: 1px;
            background-color: #232a31;
            margin: 15px 12px 5px 12px;
        }

        .label-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-color);
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
        }

        .label-item svg {
            width: 14px;
            height: 14px;
            fill: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="window-controls">
            <button class="btn-more">
                <svg width="24" height="24" viewBox="0 0 24 24">
                    <circle cx="6" cy="12" r="2"/>
                    <circle cx="12" cy="12" r="2"/>
                    <circle cx="18" cy="12" r="2"/>
                </svg>
            </button>

            <div class="profile-container">
                <button class="btn-profile" id="profileBtn" title="Vincular tu cuenta real de GitHub">
                    <svg id="avatarDefault" viewBox="0 0 16 16">
                        <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                    </svg>
                    <img id="avatarImage" src="" alt="GitHub Avatar">
                </button>

                <div class="profile-dropdown" id="profileDropdown">
                    <div class="dropdown-info" id="dropdownStatus">Cuenta no conectada</div>
                    <button class="btn-github-action" id="loginBtn">
                        <svg width="15" height="15" viewBox="0 0 16 16" fill="#fff">
                            <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                        </svg>
                        Conectar cuenta real
                    </button>
                    <button class="btn-logout-action" id="logoutBtn">Desconectar cuenta</button>
                </div>
            </div>
        </div>

        <a class="nav-item">
            <svg class="icon-blue" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span>Jusep</span>
        </a>

        <a class="nav-item">
            <svg class="icon-blue" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            <span>Jusep Esponja</span>
        </a>

        <a class="nav-item">
            <svg class="icon-blue" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span>Jusep Estrella</span>
        </a>

        <a class="nav-item">
            <svg class="icon-blue" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span>Jusep Mango</span>
        </a>

        <div class="section-header">
            <span>Jueguitos - EN DESAROLLO </span>
            <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        </div>

        <a class="nav-item active">
            <svg class="icon-blue" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="8 12 12 16 16 12"></polyline>
                <line x1="12" y1="8" x2="12" y2="16"></line>
            </svg>
            <span>Jusep Clicker</span>
        </a>

        <a class="nav-item active">
            <svg class="icon-blue" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="8 12 12 16 16 12"></polyline>
                <line x1="12" y1="8" x2="12" y2="16"></line>
            </svg>
            <span>Jusep RPG</span>
        </a>

        <div class="section-header">
            <span>Noticias</span>
            <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        </div>

        <a class="nav-item">
            <svg class="icon-blue" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
            </svg>
            <span>Primer Lanzamiento</span>
        </a>

    </div>

    <script>
        const profileBtn = document.getElementById('profileBtn');
        const profileDropdown = document.getElementById('profileDropdown');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const avatarDefault = document.getElementById('avatarDefault');
        const avatarImage = document.getElementById('avatarImage');
        const dropdownStatus = document.getElementById('dropdownStatus');

        // Evento para abrir y cerrar el menú
        profileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            profileDropdown.classList.toggle('show');
        });

        // Cerrar menú al presionar fuera
        document.addEventListener('click', () => {
            profileDropdown.classList.remove('show');
        });

        profileDropdown.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        // FUNCIONALIDAD ASÍNCRONA REAL CON LA API DE GITHUB
        loginBtn.addEventListener('click', async () => {
            const usernameInput = prompt("Escribe tu nombre de usuario exacto de GitHub:");
            if (!usernameInput || usernameInput.trim() === "") return;

            dropdownStatus.innerText = "Cargando perfil...";

            try {
                // Petición HTTP Real a los servidores de GitHub
                const response = await fetch(`https://api.github.com/users/${encodeURIComponent(usernameInput.trim())}`);
                
                if (!response.ok) {
                    throw new Error("Usuario inexistente");
                }

                const userData = await response.json();

                // Intercambiar silueta básica por la foto real de tu cuenta
                avatarImage.src = userData.avatar_url;
                avatarImage.style.display = 'block';
                avatarDefault.style.display = 'none';
                profileBtn.classList.add('connected');

                // Renderizar los datos reales obtenidos
                dropdownStatus.innerText = `Conectado: ${userData.name || userData.login}`;
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';

                // Autocerrar el menú sutilmente
                setTimeout(() => {
                    profileDropdown.classList.remove('show');
                }, 400);

            } catch (error) {
                alert("No se pudo conectar: Asegúrate de que el usuario de GitHub sea correcto.");
                dropdownStatus.innerText = "Cuenta no conectada";
            }
        });

        // Desconectar cuenta y restaurar valores por defecto
        logoutBtn.addEventListener('click', () => {
            avatarImage.src = '';
            avatarImage.style.display = 'none';
            avatarDefault.style.display = 'block';
            profileBtn.classList.remove('connected');

            dropdownStatus.innerText = "Cuenta no conectada";
            loginBtn.style.display = 'flex';
            logoutBtn.style.display = 'none';
        });
    </script>
</body>
</html>
