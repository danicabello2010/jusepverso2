<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jusep Verso 2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #12181f;
            --text-color: #f1f2f4;
            --text-muted: #868e96;
            --active-bg: #2c353d;
            --active-icon: #3a9ad9;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: var(--font-family);
            -webkit-font-smoothing: antialiased;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            height: 100vh;
            background-color: var(--bg-color);
            box-sizing: border-box;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
            flex-shrink: 0;
        }

        /* CONTENEDOR PRINCIPAL DERECHO */
        .main-content {
            flex-grow: 1;
            height: 100vh;
            background-color: #0d1117;
            color: var(--text-color);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
        }

        .main-content h1 {
            margin: 0 0 16px 0;
            font-size: 36px;
            font-weight: 600;
            padding: 0 20px;
        }

        .main-content p {
            color: var(--text-muted);
            font-size: 18px;
            margin: 0;
            max-width: 500px;
            line-height: 1.5;
            padding: 0 20px;
        }

        /* IMAGENES ABSOLUTAS: Ocupan todo el espacio disponible de borde a borde */
        .jusep-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer; /* Cursor de mano para hacer clic */
            display: none;
        }

        .window-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-left: 8px;
            padding-right: 4px;
        }

        .profile-container {
            position: relative;
        }

        .btn-profile {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #1a222b;
            border: 1px solid #3a444f;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .btn-profile:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: var(--text-muted);
        }

        .btn-profile.connected {
            border-color: #2ea44f;
        }

        .btn-profile svg {
            width: 16px;
            height: 16px;
            fill: var(--text-color);
        }

        .btn-profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .profile-dropdown {
            position: absolute;
            top: 38px;
            right: 0;
            background-color: #1a232d;
            border: 1px solid #2d3846;
            border-radius: 10px;
            width: 210px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            padding: 10px;
            display: none;
            z-index: 100;
            flex-direction: column;
            gap: 8px;
        }

        .profile-dropdown.show {
            display: flex;
        }

        .dropdown-info {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            padding: 2px 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-github-action {
            background-color: #24292e;
            color: #ffffff;
            border: 1px solid #444c56;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            width: 100%;
        }

        .btn-github-action:hover {
            background-color: #2f363d;
        }

        .btn-logout-action {
            background-color: transparent;
            color: #ff453a;
            border: none;
            padding: 6px 4px;
            font-size: 13px;
            cursor: pointer;
            text-align: left;
            display: none;
            font-weight: 500;
        }

        .btn-logout-action:hover {
            text-decoration: underline;
        }

        .btn-more {
            background-color: #2c353d;
            border: none;
            border-radius: 8px;
            width: 54px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-more svg {
            fill: var(--text-color);
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 10px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            gap: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background-color: var(--active-bg);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        .nav-item .icon-blue {
            color: var(--active-icon);
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            padding: 16px 12px 6px 12px;
            margin-top: 10px;
        }

        .section-header svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="./Jusep_data/Jusep/Sonidodemonos.mp3" loop></audio>
    <audio id="bgEsponjaMusic" src="./Jusep_data/Esponja/bsjusu.mp3" loop></audio>
    <audio id="bgEstrellaMusic" src="./Jusep_data/Estrella/baquehuate.mp3" loop></audio>
    <audio id="bgMangoMusic" src="./Jusep_data/Jusep/fondo_mango.mp3" loop></audio>

    <audio id="clickSound" src="./Jusep_data/Jusep/Hypercharge.mp3"></audio>
    <audio id="clickEsponjaSound" src="./Jusep_data/Esponja/sad.mp3"></audio>
    <audio id="clickEstrellaSound" src="./Jusep_data/Estrella/baquerisa.mp3"></audio>
    <audio id="clickMangoSound" src="./Jusep_data/Jusep/RUTA_SONIDO_MANGO.mp3"></audio>

    <div class="sidebar">
        <div class="window-controls">
            <button class="btn-more">
                <svg width="24" height="24" viewBox="0 0 24 24">
                    <circle cx="6" cy="12" r="2"/>
                    <circle cx="12" cy="12" r="2"/>
                    <circle cx="18" cy="12" r="2"/>
                </svg>
            </button>

            <div class="profile-container">
                <button class="btn-profile" id="profileBtn" title="Vincular tu cuenta real de GitHub">
                    <svg id="avatarDefault" viewBox="0 0 16 16">
                        <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                    </svg>
                    <img id="avatarImage" src="" alt="GitHub Avatar">
                </button>

                <div class="profile-dropdown" id="profileDropdown">
                    <div class="dropdown-info" id="dropdownStatus">Cuenta no conectada</div>
                    <button class="btn-github-action" id="loginBtn">
                        <svg width="15" height="15" viewBox="0 0 16 16" fill="#fff">
                            <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                        </svg>
                        Conectar cuenta real
                    </button>
                    <button class="btn-logout-action" id="logoutBtn">Desconectar cuenta</button>
                </div>
            </div>
        </div>

        <a class="nav-item active" data-section="jusep">
            <svg class="icon-blue" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span>Jusep</span>
        </a>

        <a class="nav-item" data-section="jusep-esponja">
            <svg class="icon-blue" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            <span>Jusep Esponja</span>
        </a>

        <a class="nav-item" data-section="jusep-estrella">
            <svg class="icon-blue" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span>Jusep Estrella</span>
        </a>

        <a class="nav-item" data-section="jusep-mango">
            <svg class="icon-blue" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span>Jusep Mango</span>
        </a>

        <div class="section-header">
            <span>Jueguitos - EN DESARROLLO </span>
            <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        </div>

        <a class="nav-item" data-section="jusep-clicker">
            <svg class="icon-blue" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="8 12 12 16 16 12"></polyline>
                <line x1="12" y1="8" x2="12" y2="16"></line>
            </svg>
            <span>Jusep Clicker</span>
        </a>

        <a class="nav-item" data-section="jusep-rpg">
            <svg class="icon-blue" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="8 12 12 16 16 12"></polyline>
                <line x1="12" y1="8" x2="12" y2="16"></line>
            </svg>
            <span>Jusep RPG</span>
        </a>

        <div class="section-header">
            <span>Noticias</span>
            <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        </div>

        <a class="nav-item" data-section="primer-lanzamiento">
            <svg class="icon-blue" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
            </svg>
            <span>Primer Lanzamiento</span>
        </a>
    </div>

    <div class="main-content" id="mainContent">
        <h1 id="contentTitle">Bienvenido al Jusep Verso</h1>
        <p id="contentDesc">Selecciona una opción del menú de la barra lateral para ver su contenido.</p>
        
        <img id="jusepImgElement" class="jusep-image" src="./Jusep_data/Jusep/jusep.jpg" alt="Jusep Original">
        <img id="jusepEsponjaImg" class="jusep-image" src="./Jusep_data/Esponja/jusuesponja.jpg" alt="Jusep Esponja">
        <img id="jusepEstrellaImg" class="jusep-image" src="./Jusep_data/Estrella/estrella.jpg" alt="Jusep Estrella">
        <img id="jusepMangoImg" class="jusep-image" src="./Jusep_data/Mango/mangowp.png" alt="Jusep Mango">
    </div>

    <script>
        // === COLOCA TUS DATOS DE SUPABASE AQUÍ ===
        const SUPABASE_URL = "https://fimkpoqhzwruxhpsavhc.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_TTXdlD8qqhYbBtLdSaWxqA_Ca_Uip7u"; 
        // ========================================

        const profileBtn = document.getElementById('profileBtn');
        const profileDropdown = document.getElementById('profileDropdown');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const avatarDefault = document.getElementById('avatarDefault');
        const avatarImage = document.getElementById('avatarImage');
        const dropdownStatus = document.getElementById('dropdownStatus');

        const contentTitle = document.getElementById('contentTitle');
        const contentDesc = document.getElementById('contentDesc');
        
        // Elementos de Imagen obtenidos del HTML
        const jusepImgElement = document.getElementById('jusepImgElement');
        const jusepEsponjaImg = document.getElementById('jusepEsponjaImg');
        const jusepEstrellaImg = document.getElementById('jusepEstrellaImg');
        const jusepMangoImg = document.getElementById('jusepMangoImg');

        // Elementos de Música de Fondo
        const bgMusic = document.getElementById('bgMusic');
        const bgEsponjaMusic = document.getElementById('bgEsponjaMusic');
        const bgEstrellaMusic = document.getElementById('bgEstrellaMusic');
        const bgMangoMusic = document.getElementById('bgMangoMusic');

        // Elementos de Sonido de Clic obtenidos del HTML
        const clickSound = document.getElementById('clickSound');
        const clickEsponjaSound = document.getElementById('clickEsponjaSound');
        const clickEstrellaSound = document.getElementById('clickEstrellaSound');
        const clickMangoSound = document.getElementById('clickMangoSound');
        
        const navItems = document.querySelectorAll('.nav-item');

        const sectionsData = {
            "jusep": { title: "", desc: "" },
            "jusep-esponja": { title: "", desc: "" },
            "jusep-estrella": { title: "", desc: "" },
            "jusep-mango": { title: "", desc: "" },
            "jusep-clicker": {
                title: "🎮 Jusep Clicker",
                desc: "Sección en desarrollo. Prepárate para reventar el ratón haciendo clics y ganar Jusep-Coins."
            },
            "jusep-rpg": {
                title: "⚔️ Jusep RPG",
                desc: "Sección en desarrollo. Una aventura medieval fantástica interactiva basada en decisiones."
            },
            "primer-lanzamiento": {
                title: "📰 Primer Lanzamiento",
                desc: "Notas del parche: Versión 2.0. Se ha implementado el inicio de sesión OAuth2 real integrado con GitHub."
            }
        };

        // --- ASIGNACIÓN DE CLICS A CADA IMAGEN CON SU RESPECTIVO AUDIO ---
        jusepImgElement.addEventListener('click', () => {
            clickSound.currentTime = 0;
            clickSound.play().catch(err => console.log("Error audio Jusep:", err));
        });

        jusepEsponjaImg.addEventListener('click', () => {
            clickEsponjaSound.currentTime = 0;
            clickEsponjaSound.play().catch(err => console.log("Error audio Esponja:", err));
        });

        jusepEstrellaImg.addEventListener('click', () => {
            clickEstrellaSound.currentTime = 0;
            clickEstrellaSound.play().catch(err => console.log("Error audio Estrella:", err));
        });

        jusepMangoImg.addEventListener('click', () => {
            clickMangoSound.currentTime = 0;
            clickMangoSound.play().catch(err => console.log("Error audio Mango:", err));
        });

        // Ocultar todas las imágenes secundarias del main-content de golpe
        function hideAllImages() {
            jusepImgElement.style.display = "none";
            jusepEsponjaImg.style.display = "none";
            jusepEstrellaImg.style.display = "none";
            jusepMangoImg.style.display = "none";
        }

        // Pausar de golpe todos los reproductores de música de fondo para que no se superpongan
        function pauseAllBackgroundMusic() {
            bgMusic.pause();
            bgEsponjaMusic.pause();
            bgEstrellaMusic.pause();
            bgMangoMusic.pause();
        }

        // LÓGICA DE INTERCAMBIO DE SECCIONES
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');

                const targetKey = item.getAttribute('data-section');
                
                if (sectionsData[targetKey]) {
                    contentTitle.innerText = sectionsData[targetKey].title;
                    contentDesc.innerText = sectionsData[targetKey].desc;
                }

                // Por defecto ocultamos textos e imágenes y paramos toda la música ambiental
                contentTitle.style.display = "none"; 
                contentDesc.style.display = "none";  
                hideAllImages();
                pauseAllBackgroundMusic();

                // Evaluamos a qué sección se ingresa y activamos su respectiva música
                if (targetKey === "jusep") {
                    jusepImgElement.style.display = "block"; 
                    bgMusic.play().catch(err => console.log("Audio Jusep en espera de interacción.", err));
                } 
                else if (targetKey === "jusep-esponja") {
                    jusepEsponjaImg.style.display = "block";
                    bgEsponjaMusic.play().catch(err => console.log("Audio Esponja en espera de interacción.", err));
                } 
                else if (targetKey === "jusep-estrella") {
                    jusepEstrellaImg.style.display = "block";
                    bgEstrellaMusic.play().catch(err => console.log("Audio Estrella en espera de interacción.", err));
                } 
                else if (targetKey === "jusep-mango") {
                    jusepMangoImg.style.display = "block";
                    bgMangoMusic.play().catch(err => console.log("Audio Mango en espera de interacción.", err));
                } 
                else {
                    // Si es una sección con textos (como Jueguitos o Noticias) volvemos a mostrarlos
                    contentTitle.style.display = "block"; 
                    contentDesc.style.display = "block";
                }
            });
        });

        // Configuración de arranque inicial
        const activeItem = document.querySelector('.nav-item.active');
        if(activeItem && activeItem.getAttribute('data-section') === 'jusep') {
            contentTitle.style.display = "none";
            contentDesc.style.display = "none";
            hideAllImages();
            jusepImgElement.style.display = "block";
        }

        // MENÚ PROFILE
        profileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            profileDropdown.classList.toggle('show');
        });

        document.addEventListener('click', () => profileDropdown.classList.remove('show'));
        profileDropdown.addEventListener('click', (e) => e.stopPropagation());

        let _supabase = null;
        try {
            if (SUPABASE_URL !== "TU_URL_AQUÍ" && SUPABASE_ANON_KEY !== "TU_CLAVE_ANON_AQUÍ") {
                _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch (err) {
            console.error("Error al cargar Supabase, revisa tus claves:", err);
        }

        loginBtn.addEventListener('click', async () => {
            if (!_supabase) {
                alert("Primero debes poner tus claves de Supabase en el código.");
                return;
            }
            dropdownStatus.innerText = "Abriendo GitHub...";
            const { error } = await _supabase.auth.signInWithOAuth({
                provider: 'github',
                options: { redirectTo: window.location.href }
            });
            if (error) {
                alert("Error de conexión: " + error.message);
                dropdownStatus.innerText = "Cuenta no conectada";
            }
        });

        logoutBtn.addEventListener('click', async () => {
            if (_supabase) await _supabase.auth.signOut();
            updateUI(null);
        });

        function updateUI(user) {
            if (user) {
                const avatarUrl = user.user_metadata.avatar_url;
                const name = user.user_metadata.full_name || user.user_metadata.user_name;

                avatarImage.src = avatarUrl;
                avatarImage.style.display = 'block';
                avatarDefault.style.display = 'none';
                profileBtn.classList.add('connected');
                dropdownStatus.innerText = `Conectado: ${name}`;
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
            } else {
                avatarImage.src = '';
                avatarImage.style.display = 'none';
                avatarDefault.style.display = 'block';
                profileBtn.classList.remove('connected');
                dropdownStatus.innerText = "Cuenta no conectada";
                loginBtn.style.display = 'flex';
                logoutBtn.style.display = 'none';
            }
        }

        if (_supabase) {
            _supabase.auth.onAuthStateChange((event, session) => {
                if (session) updateUI(session.user);
                else updateUI(null);
            });
        }
    </script>
</body>
</html>
